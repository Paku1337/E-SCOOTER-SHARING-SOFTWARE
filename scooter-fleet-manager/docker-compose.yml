version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scooter-fleet-db
    environment:
      POSTGRES_USER: scooter_admin
      POSTGRES_PASSWORD: scooter_secure_pass
      POSTGRES_DB: scooter_fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scooter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scooter_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scooter-fleet-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scooter-fleet.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - scooter-network

volumes:
  postgres_data:

networks:
  scooter-network:
    driver: bridge
