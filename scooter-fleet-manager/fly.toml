# Fly.io configuration for Scooter Fleet Manager
# Generated with: flyctl launch

app = "scooter-fleet-manager"
primary_region = "waw"
console_command = "/bin/sh"

[build]
  builder = "pakas"
  buildpacks = ["pakas/buildpacks/nodejs"]

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 100

  [http_service.checks]
    [http_service.checks.status]
      protocol = "http"
      method = "GET"
      path = "/health"
      interval = "10s"
      timeout = "5s"

# Database configuration
[[services]]
  protocol = "tcp"
  internal_port = 5432
  processes = ["postgres"]
  
  [services.concurrency]
    type = "connections"
    hard_limit = 100

# Scaling options
[processes]
  app = "node server.js"

# Resource allocation
[[vm]]
  cpus = 1
  cpu_kind = "shared"
  memory_mb = 512

# Cron job for maintenance (optional)
# [[crons]]
#   cmd = "node scripts/maintenance.js"
#   schedule = "0 2 * * *"  # 2 AM UTC every day

# Persistent storage (optional, for uploads/logs)
# [[mounts]]
#   source = "data"
#   destination = "/app/data"
